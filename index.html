<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="0; url=https://recordings-choir-sage-fruits.trycloudflare.com">
  <title>Vault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
      background: #faf8f4;
      color: #1c1a17;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .ring {
      width: 74px; height: 74px;
      margin: 0 auto 22px;
      border: 1.5px solid #d6cfc0;
      border-top-color: #1c1a17;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0.2, 0.6, 0.8) infinite;
      position: relative;
    }
    .ring::before {
      content: "";
      position: absolute;
      inset: 11px;
      border: 1px dashed #d6cfc0;
      border-radius: 50%;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }
    p { color: #7d7668; font-size: 13.5px; margin-top: 10px; line-height: 1.6; }
    a { color: #a67c44; }
  </style>
</head>
<body>
  <main>
    <div class="ring"></div>
    <h1>Vault</h1>
    <p>
      Opening your vault&hellip;<br>
      If nothing happens, <a href="https://recordings-choir-sage-fruits.trycloudflare.com">tap here</a>.<br>
      If that fails, the vault computer is offline.
    </p>
  </main>
  <script>window.location.replace("https://recordings-choir-sage-fruits.trycloudflare.com");</script>
</body>
</html>
